# ===== ミナミナ コンテンツ管理 設定 =====
# ★公開時に repo を「あなたのGitHubユーザー名/リポジトリ名」へ差し替えてください
backend:
  name: github
  repo: minamina16/minamina-site
  branch: main

# 画像のアップロード先フォルダ
media_folder: "images"
public_folder: "/images"

# 管理画面の表示言語
locale: ja

collections:
  - name: site
    label: サイト内容
    files:
      - name: content
        label: トップページの内容
        file: data/site.json
        format: json
        fields:
          - label: "🔝 ヒーロー（最上部）"
            name: hero
            widget: object
            collapsed: true
            fields:
              - { label: "キャッチコピー", name: catch, widget: string }
              - { label: "説明文", name: description, widget: text }
              - { label: "数字1", name: stat1_num, widget: string }
              - { label: "数字1ラベル", name: stat1_label, widget: string }
              - { label: "数字2", name: stat2_num, widget: string }
              - { label: "数字2ラベル", name: stat2_label, widget: string }
              - { label: "数字3", name: stat3_num, widget: string }
              - { label: "数字3ラベル", name: stat3_label, widget: string }
          - label: "🌿 選ばれる理由（お店紹介の本文）"
            name: about
            widget: object
            collapsed: true
            fields:
              - { label: "本文", name: body, widget: text }
          - label: "📣 おしらせ"
            name: news
            widget: list
            collapsed: true
            summary: "{{fields.date}}　{{fields.text}}"
            fields:
              - { label: "サイトに表示する（オフにすると隠せます／削除はしません）", name: visible, widget: boolean, default: true }
              - { label: "日付（カレンダーから選択）", name: date, widget: datetime, date_format: "YYYY.MM.DD", time_format: false, format: "YYYY.MM.DD" }
              - label: "タグ表示名（選んでください／選択肢は「おしらせタグの選択肢」で増やせます）"
                name: tag
                widget: relation
                collection: site
                file: newstags
                value_field: "{{items.*.name}}"
                display_fields: ["{{items.*.name}}"]
                search_fields: ["{{items.*.name}}"]
                required: false
              - label: "タグの色"
                name: tag_type
                widget: select
                required: false
                options:
                  - { label: "ピンク（おしらせ向き）", value: "info" }
                  - { label: "黄（新商品向き）", value: "new" }
                  - { label: "青（イベント向き）", value: "event" }
              - { label: "見出し（一覧に表示）", name: text, widget: string }
              - { label: "本文（クリックで開く詳細・任意）", name: body, widget: text, required: false }
              - { label: "写真（任意）", name: image, widget: image, required: false }
          - label: "🎀 特集の帯バナー（ヘッダー下に表示）"
            name: feature
            widget: object
            collapsed: true
            fields:
              - { label: "表示する（オフにすると帯・特集・メニューが全て消えます）", name: enabled, widget: boolean, default: true }
              - { label: "ラベル（例 キャンペーン情報）", name: pop, widget: string }
              - { label: "キャンペーン名（例 クラプロックス トラベルセット特集）", name: title, widget: string }
              - { label: "期間（例 期間：2026.6.1 〜 6.30）", name: period, widget: string, required: false }
              - { label: "コメント（特集ブロックの見出し下の1行・任意）", name: lead, widget: text, required: false }
              - { label: "サムネイル写真（小さく表示／任意）", name: image, widget: image, required: false }
              - { label: "リンクの文字（例 くわしく見る →）", name: button_label, widget: string }
              - { label: "リンク先（特集ブロックは #feature-block）", name: button_link, widget: string }
          - label: "🛍️ おすすめ商品"
            name: products
            widget: list
            collapsed: true
            summary: "{{fields.name}}（{{fields.detail}}）"
            fields:
              - { label: "サイトに表示する（オフにすると一覧から隠せます／削除はしません）", name: visible, widget: boolean, default: true }
              - label: "バッジ（選んでください／選択肢は「バッジの選択肢」で増やせます・不要なら空欄）"
                name: badge
                widget: relation
                collection: site
                file: badges
                value_field: "{{items.*.name}}"
                display_fields: ["{{items.*.name}}"]
                search_fields: ["{{items.*.name}}"]
                required: false
              - label: "カテゴリ（選んでください／選択肢は「カテゴリの選択肢」で増やせます）"
                name: category
                widget: relation
                collection: site
                file: categories
                value_field: "{{items.*.name}}"
                display_fields: ["{{items.*.name}}"]
                search_fields: ["{{items.*.name}}"]
                required: false
              - { label: "商品名", name: name, widget: string }
              - { label: "詳細・味・容量など（任意）", name: detail, widget: string, required: false }
              - { label: "商品説明（みじかい紹介・任意／空ならカードに出ません）", name: description, widget: text, required: false }
              - { label: "価格（数字だけ入力／例 1980 → ¥1,980 と表示）", name: price, widget: string }
              - { label: "旧価格（セール時の打ち消し線・数字だけ・任意）", name: oldprice, widget: string, required: false }
              - { label: "写真（任意）", name: image, widget: image, required: false }
              - { label: "売り切れ表示", name: soldout, widget: boolean, default: false, required: false }
              - { label: "特集ブロックに表示する", name: featured, widget: boolean, default: false, required: false }
          - label: "💬 お客さまの声"
            name: voices
            widget: list
            collapsed: true
            summary: "{{fields.name}}　{{fields.text}}"
            fields:
              - { label: "サイトに表示する（オフで隠せます／削除はしません）", name: visible, widget: boolean, default: true }
              - { label: "コメント（**で囲むと強調）", name: text, widget: text }
              - { label: "お名前・属性（例 40代・女性／常連のお客さま 等・任意）", name: name, widget: string, required: false }
          - label: "💆 セルフエステ予約"
            name: reserve
            widget: object
            collapsed: true
            fields:
              - { label: "キャンペーン表示をオンにする", name: campaign_on, widget: boolean, default: true }
              - { label: "キャンペーンの文字（**で囲むと強調／例 🎉 オープンキャンペーン中 30分 **990円**（6月末まで））", name: campaign, widget: string, required: false }
              - { label: "説明文（改行OK・**で囲むと強調）", name: desc, widget: text, required: false }
              - { label: "1回あたりの時間（例 20〜40分）", name: time, widget: string, required: false }
              - { label: "通常価格（例 ¥3,990〜）", name: price, widget: string, required: false }
          - label: "📷 インスタグラム"
            name: instagram
            widget: object
            collapsed: true
            fields:
              - { label: "アカウント名（@付き）", name: handle, widget: string }
              - { label: "プロフィールURL", name: url, widget: string }
              - { label: "説明文", name: text, widget: string }
          - label: "🏪 店舗情報"
            name: store
            widget: object
            collapsed: true
            fields:
              - { label: "平日の営業時間", name: hours_weekday, widget: string }
              - { label: "土曜の営業時間", name: hours_saturday, widget: string }
              - { label: "日曜・祝日", name: hours_sunday, widget: string }
              - { label: "店名", name: name, widget: string }
              - { label: "運営会社", name: operator, widget: string }
              - { label: "所在地", name: address, widget: string }
              - { label: "電話番号", name: tel, widget: string }
              - { label: "最寄り駅", name: station, widget: string }
              - { label: "お支払い方法", name: payment, widget: string }
          - label: "☎️ お問合せ（電話）"
            name: contact
            widget: object
            collapsed: true
            fields:
              - { label: "電話番号", name: tel, widget: string }
              - { label: "受付時間", name: tel_hours, widget: string }
      - name: badges
        label: "🏷️ バッジの選択肢（ここで増やせます）"
        file: data/badges.json
        format: json
        fields:
          - label: "バッジ一覧（行を追加すると、商品のバッジ候補が増えます）"
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: "バッジ名（例 おすすめ・人気・残りわずか）", name: name, widget: string }
      - name: newstags
        label: "🔖 おしらせタグの選択肢（ここで増やせます）"
        file: data/newstags.json
        format: json
        fields:
          - label: "タグ一覧（行を追加すると、おしらせのタグ候補が増えます）"
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: "タグ名（例 おしらせ・新商品・イベント）", name: name, widget: string }
      - name: categories
        label: "🗂️ カテゴリの選択肢（ここで増やせます）"
        file: data/categories.json
        format: json
        fields:
          - label: "カテゴリ一覧（行を追加すると、商品のカテゴリ候補が増えます）"
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: "カテゴリ名（例 歯のケア・美容ケア）", name: name, widget: string }
